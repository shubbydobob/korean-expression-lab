services:
  postgres:
    image: postgres:16
    container_name: korean-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: korean
      POSTGRES_PASSWORD: korean
      POSTGRES_DB: korean
    ports:
      - "5432:5432"
    volumes:
      - korean-postgres-data:/var/lib/postgresql/data

volumes:
  korean-postgres-data:
